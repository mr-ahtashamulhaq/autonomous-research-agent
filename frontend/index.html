<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ResearchAgent - Autonomous AI Research</title>
  <meta name="description"
    content="Enter any topic and get a comprehensive, fact-checked research report. Powered by LangGraph, Groq, and Tavily." />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><polygon points='16,3 30,29 2,29' fill='%23cc785c'/></svg>" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ── Top Nav ─────────────────────────────────────────────── -->
  <nav class="top-nav">
    <div class="nav-left">
      <a href="#" class="nav-brand">
        <svg class="nav-triangle" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <polygon points="9,1 17,17 1,17" fill="#141413" />
        </svg>
        <span class="nav-wordmark">ResearchAgent</span>
      </a>
    </div>
    <div class="nav-center">
      <span class="plan-badge">LangGraph Agent · Groq + Tavily</span>
    </div>
    <div class="nav-right">
      <a href="http://localhost:5000/docs" target="_blank" class="nav-docs-link" title="API Docs">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
          stroke-linecap="round">
          <rect x="3" y="3" width="18" height="18" rx="3" />
          <path d="M9 9h6M9 12h6M9 15h4" />
        </svg>
      </a>
    </div>
  </nav>

  <!-- ── Main Chat Area ──────────────────────────────────────── -->
  <main class="chat-main" id="chat-main">

    <!-- Welcome Screen (shown when no conversation) -->
    <div class="welcome-screen" id="welcome-screen">
      <div class="welcome-spike" aria-hidden="true">
        <svg viewBox="0 0 40 40" fill="none" aria-hidden="true">
          <polygon points="20,3 38,36 2,36" fill="#cc785c" />
        </svg>
      </div>
      <h1 class="welcome-heading">Research anything.</h1>
      <p class="welcome-sub">Enter a topic - the agent plans, searches, reads, synthesises, and fact-checks for you.</p>
    </div>

    <!-- Chat Messages (shown after first submit) -->
    <div class="chat-messages" id="chat-messages" aria-live="polite"></div>

  </main>

  <!-- ── Input Bar (always at bottom) ───────────────────────── -->
  <div class="input-bar" id="input-bar">
    <div class="input-wrap">
      <div class="input-box" id="input-box">
        <textarea id="topic-input" class="topic-textarea" placeholder="Ask anything to research…" rows="1"
          maxlength="500" autocomplete="off" spellcheck="false" aria-label="Research topic"></textarea>
        <div class="input-footer">
          <div class="input-chips" id="input-chips">
            <button class="chip" data-topic="Impact of AI on healthcare in 2024">💊 AI in Healthcare</button>
            <button class="chip" data-topic="Quantum computing breakthroughs 2024">⚛️ Quantum Computing</button>
            <button class="chip" data-topic="Climate change solutions and green technology">🌱 Climate Tech</button>
            <button class="chip" data-topic="Future of remote work and productivity">🏠 Future of Work</button>
          </div>
          <div class="input-actions">
            <span class="model-label">llama-3.3-70b</span>
            <button id="research-btn" class="send-btn" aria-label="Start research">
              <svg class="send-icon" viewBox="0 0 20 20" fill="none">
                <path d="M10 17V3M4 9l6-6 6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                  stroke-linejoin="round" />
              </svg>
              <div class="send-spinner" id="send-spinner"></div>
            </button>
          </div>
        </div>
      </div>
    </div>
    <p class="input-disclaimer">ResearchAgent uses only publicly available web sources via Tavily.</p>
  </div>

  <script src="app.js"></script>
</body>

</html>
